<svg width="1600" height="26" viewBox="0 0 1600 26" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="">
  <defs>
    <linearGradient id="dBar" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="0.8" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dRun" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#67e8f9" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes dRunner { from { transform: translateX(0); } to { transform: translateX(2020px); } }
    .run { animation: dRunner 5.5s linear infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect x="20" y="12" width="1560" height="2" rx="1" fill="url(#dBar)" opacity="0.5"/>
  <rect class="run" x="-220" y="12" width="220" height="2" fill="url(#dRun)"/>

  <g transform="translate(800,13)">
    <rect x="-5" y="-5" width="10" height="10" transform="rotate(45)" fill="#0b1224" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle r="6" fill="none" stroke="#22d3ee" stroke-opacity="0.6">
      <animate attributeName="r" values="6;16" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.6;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
