<svg width="1600" height="130" viewBox="0 0 1600 130" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="animated wave footer">
  <defs>
    <linearGradient id="wg1" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="wg3" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="barG" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes waveL { from { transform: translateX(0); } to { transform: translateX(-1600px); } }
    @keyframes waveL2 { from { transform: translateX(-400px); } to { transform: translateX(-2000px); } }
    @keyframes waveL3 { from { transform: translateX(-800px); } to { transform: translateX(-2400px); } }
    .w1 { animation: waveL 26s linear infinite; }
    .w2 { animation: waveL2 17s linear infinite; }
    .w3 { animation: waveL3 34s linear infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <g class="w3" transform="translate(-800,0)">
    <path d="M0 88 Q200 58 400 88 T800 88 T1200 88 T1600 88 T2000 88 T2400 88 T2800 88 T3200 88 T3600 88 T4000 88 L4000 130 L0 130 Z" fill="url(#wg3)" fill-opacity="0.10" transform="translate(0,10)"/>
  </g>
  <g class="w2" transform="translate(-400,0)">
    <path d="M0 70 Q200 34 400 70 T800 70 T1200 70 T1600 70 T2000 70 T2400 70 T2800 70 T3200 70 T3600 70 T4000 70 L4000 130 L0 130 Z" fill="url(#wg2)" fill-opacity="0.13" transform="translate(0,14)"/>
  </g>
  <g class="w1">
    <path d="M0 62 Q200 24 400 62 T800 62 T1200 62 T1600 62 T2000 62 T2400 62 T2800 62 T3200 62 T3600 62 T4000 62 L4000 130 L0 130 Z" fill="url(#wg1)" fill-opacity="0.18"/>
  </g>

  <rect x="0" y="125" width="1600" height="5" fill="url(#barG)" opacity="0.9"/>
</svg>
