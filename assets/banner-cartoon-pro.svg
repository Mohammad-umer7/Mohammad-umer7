      <text x="800" y="212" text-anchor="middle" font-size="100" font-weight="900" letter-spacing="-1" fill="url(#nameG)" stroke="#FFFFFF" stroke-width="16" paint-order="stroke" stroke-linejoin="round">Mohammad Umer</text>
