      <text x="800" y="336" text-anchor="middle" font-size="17" font-weight="700" fill="#3A3F63">agentic ai <tspan fill="#F0524B">•</tspan> full-stack <tspan fill="#F0524B">•</tspan> industry 4.0/5.0 <tspan fill="#F0524B">•</tspan> 6x competition podiums</text>
    </g>
