    </g>
  </g>
  <g transform="translate(1218,112) rotate(6)">
    <text class="pop p6" x="0" y="0" text-anchor="middle" font-size="40" font-weight="900" fill="#6BCB77" stroke="#FFFFFF" stroke-width="10" paint-order="stroke" stroke-linejoin="round" filter="url(#tinyDrop)">&lt;/&gt;</text>
  </g>
  <g transform="translate(452,86) rotate(9)">
    <text class="pop p7" x="0" y="0" text-anchor="middle" font-size="36" font-weight="900" fill="#FFD93D" stroke="#FFFFFF" stroke-width="9" paint-order="stroke" stroke-linejoin="round" filter="url(#tinyDrop)">{ }</text>
