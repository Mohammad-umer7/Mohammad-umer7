<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cartoon banner: Mohammad Umer — Chief AI Officer at Kanban Studios. Agentic AI, full-stack, Industry 4.0/5.0, 6x competition podiums. A polished cartoon scene with a smiling sun, laptop buddy, hovering robot, and a rocket.">
  <title>Mohammad Umer — cartoon brand banner</title>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ED8FF"/>
      <stop offset="1" stop-color="#EAF8FF"/>
    </linearGradient>
    <linearGradient id="nameG" x1="0" y1="120" x2="0" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B8FFF"/>
      <stop offset="1" stop-color="#4A4FE0"/>
    </linearGradient>
    <linearGradient id="nameShine" x1="0" y1="120" x2="0" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badgeG" x1="0" y1="246" x2="0" y2="294" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8272"/>
      <stop offset="1" stop-color="#F0524B"/>
    </linearGradient>
    <linearGradient id="lidG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FB6F2"/>
      <stop offset="1" stop-color="#6F9FE8"/>
    </linearGradient>
    <linearGradient id="botG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CDBFFF"/>
      <stop offset="1" stop-color="#9C88F5"/>
    </linearGradient>
    <linearGradient id="chipG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FAAFF"/>
      <stop offset="1" stop-color="#3D7EE8"/>
    </linearGradient>
    <radialGradient id="sunG" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#FFEfA0"/>
      <stop offset="1" stop-color="#FFC63C"/>
    </radialGradient>
    <filter id="softDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#2B4A6B" flood-opacity="0.22"/>
    </filter>
    <filter id="tinyDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#2B4A6B" flood-opacity="0.2"/>
    </filter>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="28"/></filter>

    <g id="cloudShape">
      <path d="M28 62 Q6 62 6 44 Q6 27 24 25 Q28 6 52 6 Q74 6 80 22 Q98 16 106 30 Q124 30 128 44 Q132 62 108 62 Z" fill="#FFFFFF" stroke="#33365E" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M24 56 Q50 48 106 54 Q118 56 112 60 L30 60 Q22 60 24 56 Z" fill="#D9EBFB"/>
    </g>
    <g id="bush">
      <circle cx="-18" cy="4" r="16" fill="#58BE6C" stroke="#2F9E57" stroke-width="3"/>
      <circle cx="18" cy="4" r="16" fill="#58BE6C" stroke="#2F9E57" stroke-width="3"/>
      <circle cx="0" cy="-6" r="19" fill="#63C86B" stroke="#2F9E57" stroke-width="3"/>
      <circle cx="-6" cy="-12" r="4" fill="#A5E8AC"/>
    </g>
    <g id="spark">
      <path d="M0 -11 Q2 -3 11 0 Q2 3 0 11 Q-2 3 -11 0 Q-2 -3 0 -11 Z" fill="#FFFFFF" stroke="#33365E" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </defs>

  <style>
    text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }

    @keyframes bob { from { transform: translateY(-6px); } to { transform: translateY(6px); } }
    .bob1 { animation: bob 3.6s ease-in-out infinite alternate; }
    .bob2 { animation: bob 4.4s ease-in-out infinite alternate; animation-delay: -2s; }
    .bob3 { animation: bob 3.2s ease-in-out infinite alternate; animation-delay: -1s; }

    @keyframes drift { from { transform: translateX(-18px); } to { transform: translateX(18px); } }
    .drift1 { animation: drift 14s ease-in-out infinite alternate; }
    .drift2 { animation: drift 19s ease-in-out infinite alternate; animation-delay: -7s; }
    .drift3 { animation: drift 16s ease-in-out infinite alternate; animation-delay: -11s; }

    @keyframes pop { 0% { opacity: 0; transform: scale(0.65); } 70% { transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
    .pop { transform-box: fill-box; transform-origin: center; animation: pop .7s cubic-bezier(.34,1.56,.64,1) both; }
    .p1{animation-delay:.15s} .p2{animation-delay:.32s} .p3{animation-delay:.48s}
    .p4{animation-delay:.38s} .p5{animation-delay:.55s} .p6{animation-delay:.68s} .p7{animation-delay:.8s}

    @keyframes tw { 0%,100% { opacity: .35; transform: scale(.75); } 50% { opacity: 1; transform: scale(1.1); } }
    .tw { transform-box: fill-box; transform-origin: center; animation: tw 2.8s ease-in-out infinite; }
    .twB { animation-delay: -1.2s; } .twC { animation-delay: -2.1s; animation-duration: 3.6s; }

    @keyframes wave { from { transform: rotate(-10deg); } to { transform: rotate(16deg); } }
    .wave { transform-origin: 0px 0px; animation: wave 1.5s ease-in-out infinite alternate; }

    @keyframes blinkE { 0%, 91%, 100% { transform: scaleY(1); } 94% { transform: scaleY(0.12); } }
    .eyes { transform-box: fill-box; transform-origin: center; animation: blinkE 4.4s ease-in-out infinite; }
    .eyes2 { animation-delay: -2.2s; }

    @keyframes flick { from { transform: scaleY(0.75); } to { transform: scaleY(1.2); } }
    .flame { transform-box: fill-box; transform-origin: 50% 0%; animation: flick .32s ease-in-out infinite alternate; }

    @keyframes glowP { 0%,100% { opacity: .55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
    .glow { transform-box: fill-box; transform-origin: center; animation: glowP 2.2s ease-in-out infinite; }

    @keyframes steam { 0% { opacity: 0; transform: translateY(4px); } 35% { opacity: .45; } 100% { opacity: 0; transform: translateY(-10px); } }
    .steam { animation: steam 3s ease-out infinite; }
    .steamB { animation-delay: -1.5s; }

    @keyframes puff { 0%,100% { opacity: .9; } 50% { opacity: .35; } }
    .puff { animation: puff .5s ease-in-out infinite; }
    .puffB { animation-delay: -.25s; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- ═ sky ═ -->
  <rect width="1600" height="420" fill="url(#sky)"/>

  <!-- confetti -->
  <g opacity="0.4">
    <rect x="200" y="48" width="6" height="11" rx="3" fill="#FF6B6B" transform="rotate(18 203 53)"/>
    <rect x="560" y="60" width="6" height="11" rx="3" fill="#FFD93D" transform="rotate(-24 563 65)"/>
    <rect x="1020" y="52" width="6" height="11" rx="3" fill="#6BCB77" transform="rotate(12 1023 57)"/>
    <rect x="1330" y="46" width="6" height="11" rx="3" fill="#B983FF" transform="rotate(-15 1333 51)"/>
    <rect x="80" y="120" width="6" height="11" rx="3" fill="#4D96FF" transform="rotate(30 83 125)"/>
    <rect x="1560" y="200" width="6" height="11" rx="3" fill="#FF6B6B" transform="rotate(-30 1563 205)"/>
  </g>

  <!-- birds -->
  <g stroke="#4A7FB5" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M608 72 Q614 65 620 72 Q626 65 632 72"/>
    <path d="M688 88 Q693 82 698 88 Q703 82 708 88"/>
  </g>

  <!-- rocket -->
  <g filter="url(#tinyDrop)">
    <animateMotion path="M -150 88 C 500 34, 1050 26, 1770 78" rotate="auto" dur="13s" repeatCount="indefinite"/>
    <circle class="puff" cx="-48" cy="0" r="5" fill="#FFFFFF" stroke="#33365E" stroke-width="2.5"/>
    <circle class="puffB" cx="-62" cy="0" r="3.5" fill="#FFFFFF" stroke="#33365E" stroke-width="2"/>
    <path d="M-30 -6 Q-56 0 -30 6 Q-38 0 -30 -6 Z" fill="#FFD93D" stroke="#F59E0B" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M-23 -12 L-40 -25 L-25 2 Z" fill="#6BCB77" stroke="#33365E" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-23 12 L-40 25 L-25 -2 Z" fill="#6BCB77" stroke="#33365E" stroke-width="3" stroke-linejoin="round"/>
    <rect x="-30" y="-14" width="58" height="28" rx="14" fill="#FFFFFF" stroke="#33365E" stroke-width="3"/>
    <rect x="-26" y="-11" width="30" height="8" rx="4" fill="#E6F2FF"/>
    <path d="M26 -13 Q54 0 26 13 Z" fill="#FF6B6B" stroke="#33365E" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="-1" cy="0" r="7.5" fill="#7CC4FF" stroke="#33365E" stroke-width="3"/>
    <circle cx="1.5" cy="-2.5" r="2.2" fill="#FFFFFF"/>
  </g>

  <!-- sun -->
  <g transform="translate(1462,96)">
    <g opacity="0.95">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="80s" repeatCount="indefinite"/>
      <g fill="#FFD34E">
        <rect x="-6" y="-88" width="12" height="26" rx="6"/>
        <rect x="-6" y="62" width="12" height="26" rx="6"/>
        <rect x="62" y="-6" width="26" height="12" rx="6"/>
        <rect x="-88" y="-6" width="26" height="12" rx="6"/>
        <rect x="-6" y="-88" width="12" height="26" rx="6" transform="rotate(45)"/>
        <rect x="-6" y="62" width="12" height="26" rx="6" transform="rotate(45)"/>
        <rect x="62" y="-6" width="26" height="12" rx="6" transform="rotate(45)"/>
        <rect x="-88" y="-6" width="26" height="12" rx="6" transform="rotate(45)"/>
      </g>
    </g>
    <circle r="50" fill="url(#sunG)" stroke="#E8A20C" stroke-width="3.5"/>
    <path d="M-24 -8 Q-17 -16 -10 -8" stroke="#7A4E00" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M10 -8 Q17 -16 24 -8" stroke="#7A4E00" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M-13 10 Q0 22 13 10" stroke="#7A4E00" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <circle cx="-30" cy="6" r="7" fill="#FFA47E" opacity="0.8"/>
    <circle cx="30" cy="6" r="7" fill="#FFA47E" opacity="0.8"/>
    <circle cx="-18" cy="-28" r="7" fill="#FFFFFF" opacity="0.55"/>
  </g>

  <!-- clouds -->
  <g class="drift2" opacity="0.8"><use href="#cloudShape" transform="translate(850,40) scale(0.62)"/></g>
  <g class="drift1"><use href="#cloudShape" transform="translate(190,52) scale(1.02)"/></g>
  <g class="drift3"><use href="#cloudShape" transform="translate(1120,78) scale(0.82)"/></g>

  <!-- ═ ground ═ -->
  <ellipse cx="260" cy="500" rx="620" ry="165" fill="#BDEDB0"/>
  <ellipse cx="1340" cy="510" rx="700" ry="180" fill="#92DC8C"/>
  <ellipse cx="800" cy="560" rx="1050" ry="200" fill="#6BCB77"/>

  <use href="#bush" transform="translate(520,392)"/>
  <use href="#bush" transform="translate(1120,398) scale(0.85)"/>
  <g transform="translate(620,404)"><circle cx="-7" cy="0" r="4" fill="#FFF"/><circle cx="7" cy="0" r="4" fill="#FFF"/><circle cx="0" cy="-7" r="4" fill="#FFF"/><circle cx="0" cy="7" r="4" fill="#FFF"/><circle r="4.5" fill="#FFD93D" stroke="#33365E" stroke-width="2"/></g>
  <g transform="translate(1035,410)"><circle cx="-7" cy="0" r="4" fill="#FFF"/><circle cx="7" cy="0" r="4" fill="#FFF"/><circle cx="0" cy="-7" r="4" fill="#FFF"/><circle cx="0" cy="7" r="4" fill="#FFF"/><circle r="4.5" fill="#FF6B6B" stroke="#33365E" stroke-width="2"/></g>

  <!-- ═ laptop buddy (left) ═ -->
  <ellipse cx="248" cy="382" rx="120" ry="18" fill="#2F8A4E" opacity="0.25"/>
  <g transform="translate(140,212)">
    <g class="bob1">
      <g class="pop p4" filter="url(#softDrop)">
        <g transform="translate(196,86)"><path class="wave" d="M0 0 Q16 -8 22 -26 Q24 -34 16 -34 Q8 -34 8 -24 Q4 -12 -4 -8 Z" fill="#6F9FE8" stroke="#33365E" stroke-width="3" stroke-linejoin="round"/></g>
        <path d="M22 36 Q10 42 8 56 Q8 64 16 62 Q26 58 30 48 Z" fill="#6F9FE8" stroke="#33365E" stroke-width="3" stroke-linejoin="round"/>
        <rect x="20" y="0" width="180" height="122" rx="16" fill="url(#lidG)" stroke="#33365E" stroke-width="3.5"/>
        <rect x="32" y="11" width="156" height="100" rx="11" fill="#F2F9FF" stroke="#C4DCF5" stroke-width="2"/>
        <rect x="32" y="11" width="156" height="26" rx="11" fill="#FFFFFF" opacity="0.6"/>
        <g class="eyes">
          <circle cx="84" cy="52" r="8.5" fill="#33365E"/>
          <circle cx="136" cy="52" r="8.5" fill="#33365E"/>
          <circle cx="87" cy="49" r="2.8" fill="#FFFFFF"/>
          <circle cx="139" cy="49" r="2.8" fill="#FFFFFF"/>
        </g>
        <path d="M92 74 Q110 92 128 74" stroke="#33365E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
        <circle cx="66" cy="68" r="7.5" fill="#FFB3C1" opacity="0.9"/>
        <circle cx="154" cy="68" r="7.5" fill="#FFB3C1" opacity="0.9"/>
        <path d="M178 10 c-3.5 -6 -12.5 -3.5 -12.5 2.6 c0 5.3 7 8.8 12.5 12.4 c5.5 -3.6 12.5 -7.1 12.5 -12.4 c0 -6.1 -9 -8.6 -12.5 -2.6 Z" fill="#FF6B6B" stroke="#33365E" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M8 118 H212 Q224 118 220 130 Q216 146 200 146 H20 Q4 146 0 130 Q-4 118 8 118 Z" fill="#B8DFF5" stroke="#33365E" stroke-width="3.5" stroke-linejoin="round"/>
        <rect x="86" y="126" width="48" height="9" rx="4.5" fill="#8FC3E4"/>
      </g>
    </g>
  </g>

  <!-- coffee -->
  <g transform="translate(392,330)">
    <g class="bob3">
      <path class="steam" d="M12 -10 q5 -7 0 -14 q-5 -7 0 -13" stroke="#33365E" stroke-width="3" stroke-linecap="round" fill="none" opacity="0"/>
      <path class="steam steamB" d="M28 -10 q5 -7 0 -14 q-5 -7 0 -13" stroke="#33365E" stroke-width="3" stroke-linecap="round" fill="none" opacity="0"/>
      <g class="pop p5" filter="url(#tinyDrop)">
        <path d="M42 8 q15 0 15 13 q0 13 -15 13" stroke="#33365E" stroke-width="3.5" fill="none"/>
        <rect x="0" y="0" width="44" height="40" rx="9" fill="#FFFFFF" stroke="#33365E" stroke-width="3.5"/>
        <rect x="6" y="6" width="32" height="9" rx="4.5" fill="#A9714B"/>
        <rect x="6" y="24" width="32" height="5" rx="2.5" fill="#FFD3DB"/>
      </g>
    </g>
  </g>

  <!-- ═ robot buddy (right) ═ -->
  <ellipse cx="1352" cy="386" rx="95" ry="16" fill="#2F8A4E" opacity="0.25"/>
  <g transform="translate(1282,168)">
