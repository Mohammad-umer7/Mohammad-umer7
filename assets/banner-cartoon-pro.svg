          <circle cx="84" cy="44" r="7" fill="#8FF7E4"/>
          <circle cx="58" cy="42" r="2.2" fill="#FFFFFF"/>
          <circle cx="86" cy="42" r="2.2" fill="#FFFFFF"/>
        </g>
        <path d="M60 56 Q70 63 80 56" stroke="#8FF7E4" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M34 100 Q16 104 14 116" stroke="#33365E" stroke-width="4" stroke-linecap="round" fill="none"/>
        <circle cx="12" cy="120" r="7" fill="#9C88F5" stroke="#33365E" stroke-width="3"/>
        <path d="M106 100 Q124 104 126 116" stroke="#33365E" stroke-width="4" stroke-linecap="round" fill="none"/>
        <circle cx="128" cy="120" r="7" fill="#9C88F5" stroke="#33365E" stroke-width="3"/>
