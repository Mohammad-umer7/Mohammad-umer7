      <g class="pop p6" filter="url(#softDrop)">
        <line x1="70" y1="8" x2="70" y2="-16" stroke="#33365E" stroke-width="4" stroke-linecap="round"/>
        <circle class="glow" cx="70" cy="-24" r="9" fill="#FFD93D" stroke="#E8A20C" stroke-width="2.5"/>
        <rect x="20" y="6" width="100" height="76" rx="24" fill="url(#botG)" stroke="#33365E" stroke-width="3.5"/>
        <rect x="30" y="16" width="80" height="20" rx="10" fill="#FFFFFF" opacity="0.35"/>
        <rect x="34" y="24" width="72" height="44" rx="14" fill="#33365E"/>
        <g class="eyes eyes2">
