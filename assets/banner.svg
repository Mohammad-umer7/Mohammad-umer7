<svg width="1600" height="400" viewBox="0 0 1600 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mohammad Umer — Chief AI Officer at Kanban Studios. Agentic AI, Full-Stack Engineering, Industry 4.0/5.0. Abu Dhabi, UAE. Open to collaboration.">
  <title>Mohammad Umer — Chief AI Officer @ Kanban Studios</title>

  <defs>
    <pattern id="crosses" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M36 40 H44 M40 36 V44" stroke="#1c222b" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, Menlo, monospace; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .f1,.f2,.f3,.f4,.f5,.f6,.f7 { animation: fadeUp .6s cubic-bezier(.22,.61,.36,1) both; }
    .f1{animation-delay:.05s} .f2{animation-delay:.14s} .f3{animation-delay:.23s}
    .f4{animation-delay:.32s} .f5{animation-delay:.41s} .f6{animation-delay:.50s} .f7{animation-delay:.59s}

    @keyframes blink { 0%,54% { opacity: 1; } 55%,100% { opacity: 0; } }
    .caret { animation: blink 1.2s steps(1) infinite; }

    @keyframes ping { 0% { opacity: .45; } 70%,100% { opacity: 0; } }
    .ping { animation: ping 2.4s ease-out infinite; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- background -->
  <rect width="1600" height="400" fill="#0d1117"/>
  <rect width="1600" height="400" fill="url(#crosses)"/>

  <!-- crop marks -->
  <g stroke="#30363d" stroke-width="1">
    <path d="M24 44 V24 H44"/>
    <path d="M1556 24 H1576 V44"/>
    <path d="M24 356 V376 H44"/>
    <path d="M1576 356 V376 H1556"/>
  </g>

  <!-- ══ left: identity ══ -->
  <rect class="f1" x="96" y="126" width="5" height="112" fill="#58a6ff"/>

  <text class="mono f2" x="122" y="142" font-size="14" letter-spacing="3" fill="#8b949e">// AI/ML &amp; SOFTWARE ENGINEER</text>

  <text class="f3" x="118" y="218" font-size="92" font-weight="800" letter-spacing="-1" fill="#e6edf3">MOHAMMAD <tspan fill="none" stroke="#58a6ff" stroke-width="2">UMER</tspan></text>

  <text class="f4" x="122" y="262" font-size="25" font-weight="600" fill="#e6edf3">Chief AI Officer <tspan fill="#484f58" font-weight="400">@</tspan> <tspan fill="#58a6ff" font-weight="700">Kanban Studios</tspan></text>

  <rect class="f5" x="122" y="288" width="700" height="1" fill="#30363d"/>

  <text class="mono f6" x="122" y="322" font-size="14" letter-spacing="2" fill="#8b949e">AGENTIC AI <tspan fill="#30363d">/</tspan> FULL-STACK <tspan fill="#30363d">/</tspan> INDUSTRY 4.0/5.0 <tspan fill="#30363d">/</tspan> 6× COMPETITION PODIUMS <tspan class="caret" fill="#58a6ff">▍</tspan></text>

  <!-- ══ right: spec card ══ -->
  <g class="f7">
    <rect x="1070" y="88" width="436" height="224" rx="8" fill="#10151c" stroke="#30363d" stroke-width="1"/>
    <rect x="1084" y="80" width="100" height="16" fill="#0d1117"/>
    <text class="mono" x="1092" y="93" font-size="13" letter-spacing="2" fill="#8b949e">// PROFILE</text>

    <line x1="1196" y1="112" x2="1196" y2="288" stroke="#21262d" stroke-width="1"/>

    <text class="mono" x="1094" y="134" font-size="14" letter-spacing="1" fill="#6e7681">ROLE</text>
    <text class="mono" x="1212" y="134" font-size="14.5" fill="#e6edf3">Chief AI Officer</text>

    <text class="mono" x="1094" y="172" font-size="14" letter-spacing="1" fill="#6e7681">COMPANY</text>
    <text class="mono" x="1212" y="172" font-size="14.5" fill="#58a6ff">Kanban Studios</text>

    <text class="mono" x="1094" y="210" font-size="14" letter-spacing="1" fill="#6e7681">FOCUS</text>
    <text class="mono" x="1212" y="210" font-size="14.5" fill="#e6edf3">Agentic AI · RAG</text>

    <text class="mono" x="1094" y="248" font-size="14" letter-spacing="1" fill="#6e7681">BASE</text>
    <text class="mono" x="1212" y="248" font-size="14.5" fill="#e6edf3">Abu Dhabi, UAE</text>

    <text class="mono" x="1094" y="286" font-size="14" letter-spacing="1" fill="#6e7681">STATUS</text>
    <circle class="ping" cx="1218" cy="281" r="9" fill="#3fb950"/>
    <circle cx="1218" cy="281" r="4" fill="#3fb950"/>
    <text class="mono" x="1234" y="286" font-size="14.5" fill="#3fb950">Open to collaboration</text>
  </g>

  <!-- ══ bottom title block ══ -->
  <line x1="40" y1="352" x2="1560" y2="352" stroke="#21262d" stroke-width="1"/>
  <text class="mono" x="96" y="378" font-size="12" letter-spacing="1" fill="#6e7681">github.com/Mohammad-umer7</text>
  <text class="mono" x="1504" y="378" font-size="12" letter-spacing="1" fill="#6e7681" text-anchor="end">BUILT TO SHIP — NOT JUST DEMO</text>
</svg>
