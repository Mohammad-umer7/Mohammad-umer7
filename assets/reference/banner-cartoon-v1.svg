<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cartoon banner: Mohammad Umer — Chief AI Officer at Kanban Studios. A smiling sun, clouds, a happy laptop, a friendly terminal, and a rocket flying across the sky.">
  <title>Mohammad Umer — cartoon dev banner</title>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ED0FF"/>
      <stop offset="1" stop-color="#D6F1FF"/>
    </linearGradient>
    <filter id="stickerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="0" flood-color="#2D3250" flood-opacity="0.18"/>
    </filter>
  </defs>

  <style>
    text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'Cascadia Code', Consolas, Menlo, monospace; }
    .ln { stroke: #2D3250; stroke-width: 3.5; stroke-linejoin: round; stroke-linecap: round; }

    @keyframes bob { from { transform: translateY(-7px); } to { transform: translateY(7px); } }
    .bob1 { animation: bob 3.4s ease-in-out infinite alternate; }
    .bob2 { animation: bob 4.2s ease-in-out infinite alternate; animation-delay: -1.6s; }
    .bob3 { animation: bob 3.8s ease-in-out infinite alternate; animation-delay: -0.8s; }

    @keyframes drift { from { transform: translateX(-22px); } to { transform: translateX(22px); } }
    .drift1 { animation: drift 13s ease-in-out infinite alternate; }
    .drift2 { animation: drift 18s ease-in-out infinite alternate; animation-delay: -6s; }
    .drift3 { animation: drift 15s ease-in-out infinite alternate; animation-delay: -10s; }

    @keyframes pop { 0% { opacity: 0; transform: scale(0.6); } 70% { transform: scale(1.06); } 100% { opacity: 1; transform: scale(1); } }
    .pop { transform-box: fill-box; transform-origin: center; animation: pop .65s cubic-bezier(.34,1.56,.64,1) both; }
    .p1{animation-delay:.1s} .p2{animation-delay:.25s} .p3{animation-delay:.4s} .p4{animation-delay:.3s}
    .p5{animation-delay:.5s} .p6{animation-delay:.65s} .p7{animation-delay:.8s}

    @keyframes twinkle { 0%,100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
    .tw { transform-box: fill-box; transform-origin: center; animation: twinkle 2.6s ease-in-out infinite; }
    .tw2 { animation-delay: -1.1s; } .tw3 { animation-delay: -1.9s; animation-duration: 3.4s; }

    @keyframes blink { 0%,54% { opacity: 1; } 55%,100% { opacity: 0; } }
    .caret { animation: blink 1.1s steps(1) infinite; }

    @keyframes steam { 0% { opacity: 0; transform: translateY(4px); } 35% { opacity: .5; } 100% { opacity: 0; transform: translateY(-10px); } }
    .steam { animation: steam 2.8s ease-out infinite; }
    .steam2 { animation-delay: -1.4s; }

    @keyframes puff { 0%,100% { opacity: .9; } 50% { opacity: .3; } }
    .puff { animation: puff .5s ease-in-out infinite; }
    .puff2 { animation-delay: -0.25s; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- sky -->
  <rect width="1600" height="420" fill="url(#sky)"/>

  <!-- confetti -->
  <g opacity="0.55">
    <rect x="150" y="60" width="7" height="12" rx="3" fill="#FF6B6B"/>
    <rect x="320" y="40" width="7" height="12" rx="3" fill="#4D96FF" transform="rotate(30 323 46)"/>
    <rect x="540" y="55" width="7" height="12" rx="3" fill="#6BCB77"/>
    <rect x="700" y="92" width="7" height="12" rx="3" fill="#FFD93D" transform="rotate(-20 703 98)"/>
    <rect x="830" y="45" width="7" height="12" rx="3" fill="#B983FF"/>
    <rect x="1000" y="70" width="7" height="12" rx="3" fill="#FF6B6B" transform="rotate(15 1003 76)"/>
    <rect x="1150" y="45" width="7" height="12" rx="3" fill="#4D96FF"/>
    <rect x="1390" y="60" width="7" height="12" rx="3" fill="#6BCB77" transform="rotate(-25 1393 66)"/>
    <rect x="60" y="220" width="7" height="12" rx="3" fill="#6BCB77"/>
    <rect x="1560" y="260" width="7" height="12" rx="3" fill="#FF6B6B" transform="rotate(40 1563 266)"/>
  </g>

  <!-- rocket (flies behind everything) -->
  <g>
    <animateMotion path="M -140 130 C 450 55, 1050 35, 1760 100" rotate="auto" dur="12s" repeatCount="indefinite"/>
    <circle class="puff" cx="-46" cy="0" r="5" fill="#FFFFFF" stroke="#2D3250" stroke-width="2.5"/>
    <circle class="puff2" cx="-60" cy="0" r="3.5" fill="#FFFFFF" stroke="#2D3250" stroke-width="2"/>
    <path class="ln" d="M-30 -6 Q-54 0 -30 6 Q-38 0 -30 -6 Z" fill="#FFD93D"/>
    <path class="ln" d="M-24 -12 L-40 -24 L-26 2 Z" fill="#6BCB77"/>
    <path class="ln" d="M-24 12 L-40 24 L-26 -2 Z" fill="#6BCB77"/>
    <rect class="ln" x="-30" y="-14" width="58" height="28" rx="14" fill="#FFFFFF"/>
    <path class="ln" d="M26 -13 Q52 0 26 13 Z" fill="#FF6B6B"/>
    <circle class="ln" cx="0" cy="0" r="7.5" fill="#4D96FF"/>
  </g>

  <!-- sun -->
  <g transform="translate(1458,94)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="70s" repeatCount="indefinite"/>
      <g fill="#FFD93D" stroke="#2D3250" stroke-width="3">
        <rect x="-5" y="-86" width="10" height="26" rx="5"/>
        <rect x="-5" y="60" width="10" height="26" rx="5"/>
        <rect x="60" y="-5" width="26" height="10" rx="5"/>
        <rect x="-86" y="-5" width="26" height="10" rx="5"/>
        <rect x="-5" y="-86" width="10" height="26" rx="5" transform="rotate(45)"/>
        <rect x="-5" y="60" width="10" height="26" rx="5" transform="rotate(45)"/>
        <rect x="60" y="-5" width="26" height="10" rx="5" transform="rotate(45)"/>
        <rect x="-86" y="-5" width="26" height="10" rx="5" transform="rotate(45)"/>
      </g>
    </g>
    <circle class="ln" r="48" fill="#FFD93D"/>
    <circle cx="-15" cy="-6" r="5" fill="#2D3250"/>
    <circle cx="15" cy="-6" r="5" fill="#2D3250"/>
    <path d="M-16 12 Q0 27 16 12" stroke="#2D3250" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="-27" cy="8" r="6" fill="#FFB4A2" opacity="0.85"/>
    <circle cx="27" cy="8" r="6" fill="#FFB4A2" opacity="0.85"/>
  </g>

  <!-- clouds -->
  <g class="drift1">
    <g class="ln" fill="#FFFFFF">
      <circle cx="218" cy="82" r="24"/><circle cx="252" cy="70" r="30"/><circle cx="288" cy="84" r="22"/>
      <rect x="200" y="72" width="106" height="32" rx="16"/>
    </g>
  </g>
  <g class="drift2">
    <g class="ln" fill="#FFFFFF">
      <circle cx="866" cy="58" r="18"/><circle cx="892" cy="48" r="23"/><circle cx="920" cy="60" r="17"/>
      <rect x="852" y="50" width="82" height="26" rx="13"/>
    </g>
  </g>
  <g class="drift3">
    <g class="ln" fill="#FFFFFF">
      <circle cx="1268" cy="122" r="21"/><circle cx="1300" cy="110" r="27"/><circle cx="1332" cy="124" r="19"/>
      <rect x="1252" y="112" width="96" height="30" rx="15"/>
    </g>
  </g>

  <!-- hills -->
  <ellipse class="ln" cx="300" cy="478" rx="540" ry="135" fill="#98E09B"/>
  <ellipse class="ln" cx="1180" cy="492" rx="680" ry="155" fill="#6BCB77"/>

  <!-- flowers -->
  <g>
    <g transform="translate(258,382)"><circle cx="-7" cy="0" r="4" fill="#FFF"/><circle cx="7" cy="0" r="4" fill="#FFF"/><circle cx="0" cy="-7" r="4" fill="#FFF"/><circle cx="0" cy="7" r="4" fill="#FFF"/><circle r="4.5" fill="#FFD93D" stroke="#2D3250" stroke-width="2"/></g>
    <g transform="translate(540,398)"><circle cx="-7" cy="0" r="4" fill="#FFF"/><circle cx="7" cy="0" r="4" fill="#FFF"/><circle cx="0" cy="-7" r="4" fill="#FFF"/><circle cx="0" cy="7" r="4" fill="#FFF"/><circle r="4.5" fill="#FF6B6B" stroke="#2D3250" stroke-width="2"/></g>
    <g transform="translate(1420,392)"><circle cx="-7" cy="0" r="4" fill="#FFF"/><circle cx="7" cy="0" r="4" fill="#FFF"/><circle cx="0" cy="-7" r="4" fill="#FFF"/><circle cx="0" cy="7" r="4" fill="#FFF"/><circle r="4.5" fill="#FFD93D" stroke="#2D3250" stroke-width="2"/></g>
  </g>

  <!-- bubbles -->
  <g stroke="#2D3250" stroke-width="2.5">
    <circle cx="330" cy="140" r="10" fill="#4D96FF" opacity="0.5"/>
    <circle cx="700" cy="48" r="8" fill="#FF6B6B" opacity="0.5"/>
    <circle cx="1330" cy="185" r="12" fill="#FFD93D" opacity="0.55"/>
    <circle cx="90" cy="318" r="14" fill="#B983FF" opacity="0.5"/>
    <circle cx="1502" cy="318" r="10" fill="#6BCB77" opacity="0.55"/>
    <circle cx="556" cy="332" r="8" fill="#4D96FF" opacity="0.5"/>
  </g>

  <!-- sparkles (outer g = position, inner path = animation; never both) -->
  <g fill="#FFFFFF" stroke="#2D3250" stroke-width="2">
    <g transform="translate(382,62)"><path class="tw" d="M0 -11 L3 -3 L11 0 L3 3 L0 11 L-3 3 L-11 0 L-3 -3 Z"/></g>
    <g transform="translate(760,72)"><path class="tw tw2" d="M0 -9 L2.5 -2.5 L9 0 L2.5 2.5 L0 9 L-2.5 2.5 L-9 0 L-2.5 -2.5 Z" fill="#FFD93D"/></g>
    <g transform="translate(1178,62)"><path class="tw tw3" d="M0 -10 L2.8 -2.8 L10 0 L2.8 2.8 L0 10 L-2.8 2.8 L-10 0 L-2.8 -2.8 Z"/></g>
    <g transform="translate(60,150)"><path class="tw tw2" d="M0 -9 L2.5 -2.5 L9 0 L2.5 2.5 L0 9 L-2.5 2.5 L-9 0 L-2.5 -2.5 Z" fill="#FF6B6B"/></g>
    <g transform="translate(1544,212)"><path class="tw" d="M0 -9 L2.5 -2.5 L9 0 L2.5 2.5 L0 9 L-2.5 2.5 L-9 0 L-2.5 -2.5 Z" fill="#FFD93D"/></g>
    <g transform="translate(958,338)"><path class="tw tw3" d="M0 -9 L2.5 -2.5 L9 0 L2.5 2.5 L0 9 L-2.5 2.5 L-9 0 L-2.5 -2.5 Z"/></g>
  </g>

  <!-- bracket stickers -->
  <g transform="translate(474,88) rotate(8)">
    <text class="pop p5" x="0" y="0" text-anchor="middle" font-size="44" font-weight="900" fill="#FFD93D" stroke="#FFFFFF" stroke-width="9" paint-order="stroke" stroke-linejoin="round" filter="url(#stickerShadow)">{ }</text>
  </g>
  <g transform="translate(1064,98) rotate(-7)">
    <text class="pop p6" x="0" y="0" text-anchor="middle" font-size="40" font-weight="900" fill="#6BCB77" stroke="#FFFFFF" stroke-width="9" paint-order="stroke" stroke-linejoin="round" filter="url(#stickerShadow)">&lt;/&gt;</text>
  </g>

  <!-- laptop buddy -->
  <g transform="translate(140,228)">
    <g class="bob1">
      <g class="pop p4">
        <rect class="ln" x="22" y="0" width="176" height="118" rx="14" fill="#FFFFFF"/>
        <rect x="34" y="12" width="152" height="94" rx="10" fill="#E8F4FF"/>
        <circle cx="82" cy="48" r="7" fill="#2D3250"/>
        <circle cx="138" cy="48" r="7" fill="#2D3250"/>
        <path d="M88 72 Q110 90 132 72" stroke="#2D3250" stroke-width="4.5" stroke-linecap="round" fill="none"/>
        <circle cx="66" cy="66" r="7" fill="#FFB4A2" opacity="0.85"/>
        <circle cx="154" cy="66" r="7" fill="#FFB4A2" opacity="0.85"/>
        <path class="ln" d="M172 8 c-4 -7 -14 -4 -14 3 c0 6 8 10 14 14 c6 -4 14 -8 14 -14 c0 -7 -10 -10 -14 -3 Z" fill="#FF6B6B" transform="scale(0.9)"/>
        <rect class="ln" x="0" y="114" width="220" height="34" rx="16" fill="#B8DFF5"/>
        <rect x="88" y="124" width="44" height="10" rx="5" fill="#8FC3E4"/>
        <g class="pop p7">
          <rect class="ln" x="150" y="-52" width="86" height="42" rx="20" fill="#FFFFFF"/>
          <path class="ln" d="M170 -12 L162 4 L186 -10 Z" fill="#FFFFFF"/>
          <path d="M170 -13 L165 -3 L184 -11" stroke="#FFFFFF" stroke-width="4" fill="none"/>
          <text x="193" y="-24" text-anchor="middle" font-size="21" font-weight="800" fill="#2D3250">hi!</text>
        </g>
      </g>
    </g>
  </g>

  <!-- coffee -->
  <g transform="translate(400,318)">
    <g class="bob3">
      <path class="steam" d="M12 -12 q5 -8 0 -16 q-5 -8 0 -14" stroke="#2D3250" stroke-width="3" fill="none" opacity="0"/>
      <path class="steam steam2" d="M30 -12 q5 -8 0 -16 q-5 -8 0 -14" stroke="#2D3250" stroke-width="3" fill="none" opacity="0"/>
      <path class="ln" d="M44 8 q16 0 16 14 q0 14 -16 14" fill="none"/>
      <rect class="ln" x="0" y="0" width="46" height="42" rx="9" fill="#FFFFFF"/>
      <rect x="6" y="6" width="34" height="10" rx="5" fill="#A9714B"/>
    </g>
  </g>

  <!-- terminal buddy -->
  <g transform="translate(1236,262)">
    <g class="bob2">
      <g class="pop p5">
        <rect class="ln" x="0" y="0" width="234" height="132" rx="16" fill="#B983FF"/>
        <circle cx="26" cy="22" r="6" fill="#FF6B6B" stroke="#2D3250" stroke-width="2.5"/>
        <circle cx="48" cy="22" r="6" fill="#FFD93D" stroke="#2D3250" stroke-width="2.5"/>
        <circle cx="70" cy="22" r="6" fill="#6BCB77" stroke="#2D3250" stroke-width="2.5"/>
        <rect x="14" y="40" width="206" height="78" rx="10" fill="#2D3250"/>
        <text class="mono" x="28" y="72" font-size="16" fill="#B7F5C2">$ npm run joy</text>
        <rect class="caret" x="158" y="58" width="9" height="17" fill="#B7F5C2"/>
        <text class="mono" x="28" y="100" font-size="14" fill="#7CC4FF">✓ shipped with love</text>
      </g>
    </g>
  </g>

  <!-- name block -->
  <g transform="rotate(-2 610 214)">
    <text class="pop p1" x="610" y="186" text-anchor="middle" font-size="88" font-weight="900" fill="#2D3250" stroke="#FFFFFF" stroke-width="14" paint-order="stroke" stroke-linejoin="round" filter="url(#stickerShadow)">Mohammad Umer</text>
    <g class="pop p2">
      <rect class="ln" x="385" y="212" width="450" height="46" rx="23" fill="#FF6B6B" filter="url(#stickerShadow)"/>
      <text x="610" y="243" text-anchor="middle" font-size="20" font-weight="800" letter-spacing="1" fill="#FFFFFF">CHIEF AI OFFICER @ KANBAN STUDIOS</text>
    </g>
    <text class="pop p3" x="610" y="296" text-anchor="middle" font-size="17" font-weight="600" fill="#2D3250" opacity="0.75">agentic ai · full-stack · industry 4.0/5.0 · 6× competition podiums</text>
  </g>
</svg>
